<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner Hub Pro - v6.0</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
       :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --dark: #0f172a; }
       * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
       body, html { margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); height: 100vh; width: 100vw; overflow: hidden; }
       .page { display: none; height: 100vh; width: 100vw; flex-direction: column; overflow: hidden; }
       .page.active { display: flex; }
       #page-home { justify-content: center; align-items: center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; text-align: center; }
       .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px; width: 100%; max-width: 400px; }
       .menu-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 25px 10px; cursor: pointer; transition: 0.2s; backdrop-filter: blur(10px); }
       .menu-card:active { transform: scale(0.95); }
       .back-bar { background: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #e2e8f0; color: var(--dark); z-index: 100; }
       .scanner-container { position: relative; height: 30vh; width: 100%; background: #000; overflow: hidden; flex-shrink: 0; }
       #inv-reader { width: 100% !important; height: 100% !important; }
       .viewfinder-box {
           position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
           width: 260px; height: 100px;
           border: 2px solid rgba(255,255,255,0.3); border-radius: 12px;
           z-index: 50; pointer-events: none;
       }
       .viewfinder-box::after {
           content: ''; position: absolute; inset: -2px;
           border: 4px solid var(--primary); border-radius: 12px;
           clip-path: polygon(0 0, 20% 0, 20% 10%, 80% 10%, 80% 0, 100% 0, 100% 30%, 90% 30%, 90% 70%, 100% 70%, 100% 100%, 80% 100%, 80% 90%, 20% 90%, 20% 100%, 0 100%, 0 70%, 10% 70%, 10% 30%, 0 30%);
       }
       .history-container { flex-grow: 1; background: var(--bg); border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 60; }
       .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
       .btn { border: none; border-radius: 10px; padding: 10px 2px; font-size: 0.7rem; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
       .btn-primary { background: var(--primary); color: white; }
       .btn-success { background: var(--success); color: white; }
       .btn-outline { background: white; border: 1px solid #e2e8f0; color: var(--dark); }
       .session-header { background: var(--dark); color: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
       .history-list { flex-grow: 1; overflow-y: auto; padding-bottom: 10px; }
       .scan-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: white; border-radius: 10px; margin-bottom: 6px; border-left: 5px solid var(--primary); }
       /* Export Modal Overlay */
       #export-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; flex-direction: column; padding: 20px; color: white; }
       .modal-content { background: white; color: var(--dark); border-radius: 20px; flex-grow: 1; display: flex; flex-direction: column; padding: 15px; overflow: hidden; }
       .flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 101; }
       .flash-active { animation: flash-anim 0.2s ease-out; }
       @keyframes flash-anim { 0% { opacity: 0.7; } 100% { opacity: 0; } }
</style>
</head>
<body>
<div id="page-home" class="page active">
<h1>Scanner Hub Pro</h1>
<div class="menu-grid">
<div class="menu-card" onclick="switchPage('page-inventory')">
<i data-lucide="package-search"></i><h3>Inventory</h3>
</div>
</div>
</div>
<div id="page-inventory" class="page">
<div class="back-bar">
<div onclick="stopAndHome('inv')" style="display:flex; align-items:center;"><i data-lucide="chevron-left"></i> Back</div>
<div>Saved Records: <span id="saved-count" style="color:var(--primary)">0</span></div>
</div>
<div class="scanner-container">
<div id="inv-reader"></div>
<div class="viewfinder-box"></div>
<div id="inv-flash" class="flash-overlay"></div>
</div>
<div class="history-container">
<div class="action-grid">
<button id="inv-toggle-btn" onclick="toggleScanner('inv')" class="btn btn-primary"><i data-lucide="camera"></i><span id="inv-btn-text">Start</span></button>
<button onclick="document.getElementById('inv-file').click()" class="btn btn-outline"><i data-lucide="database"></i>Import DB</button>
<button onclick="finishSession()" class="btn btn-success"><i data-lucide="check-circle"></i>Finish</button>
<button onclick="openExportModal()" class="btn btn-outline"><i data-lucide="download"></i>Export</button>
</div>
<input type="file" id="inv-file" style="display:none" onchange="importExcel(event)">
<div class="session-header">
<div>Loc: <span id="session-loc-display" style="color:var(--success)">Wait Loc...</span></div>
<div id="session-count-display">Items: 0</div>
</div>
<div id="active-session-list" class="history-list">
</div>
</div>
</div>
<div id="export-modal">
<div class="modal-content">
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
<h3 style="margin:0;">Select Records</h3>
<button onclick="closeExportModal()" style="background:none; border:none;"><i data-lucide="x"></i></button>
</div>
<div style="display:flex; gap:10px; margin-bottom:10px;">
<button onclick="selectAll(true)" class="btn btn-outline" style="flex:1;">Select All</button>
<button onclick="processExport()" class="btn btn-primary" style="flex:1;">Export CSV</button>
</div>
<div id="modal-record-list" class="history-list" style="border-top:1px solid #eee; padding-top:10px;">
</div>
</div>
</div>
<script>
       let scanner = null;
       let invDb = {};
       let savedRecords = []; // All history
       let currentSession = { loc: null, items: [] };
       let lastScanTime = 0;
       window.addEventListener('load', () => {
           const stored = localStorage.getItem('invFinalRecords');
           if(stored) savedRecords = JSON.parse(stored);
           const db = localStorage.getItem('invDb');
           if(db) invDb = JSON.parse(db);
           updateSavedCount();
           lucide.createIcons();
       });
       function switchPage(id) {
           document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
           document.getElementById(id).classList.add('active');
           lucide.createIcons();
       }
       async function stopAndHome() {
           if(scanner) { await scanner.stop(); scanner = null; }
           switchPage('page-home');
       }
       async function toggleScanner(type) {
           const btnText = document.getElementById(`inv-btn-text`);
           if (scanner && scanner.getState() === 2) {
               await scanner.stop();
               btnText.innerText = "Start";
           } else {
               if (!scanner) scanner = new Html5Qrcode(`inv-reader`);
               await scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 100 } }, (text) => onScanSuccess(text));
               btnText.innerText = "Stop";
           }
       }
       function onScanSuccess(text) {
           if (Date.now() - lastScanTime < 1500) return;
           lastScanTime = Date.now();
           // Visual feedback
           const flash = document.getElementById(`inv-flash`);
           flash.classList.add('flash-active');
           setTimeout(() => flash.classList.remove('flash-active'), 200);
           processBarcode(text.trim());
       }
       function processBarcode(code) {
           if (!currentSession.loc) {
               currentSession.loc = code;
               document.getElementById('session-loc-display').innerText = code;
           } else {
               const itemName = invDb[code] || "Unknown Item";
               currentSession.items.push({ barcode: code, name: itemName });
               renderActiveSession();
           }
       }
       function renderActiveSession() {
           const list = document.getElementById('active-session-list');
           document.getElementById('session-count-display').innerText = `Items: ${currentSession.items.length}`;
           list.innerHTML = currentSession.items.slice().reverse().map((item, revIdx) => {
               const actualIdx = currentSession.items.length - 1 - revIdx;
               return `
<div class="scan-item">
<div><b>${item.barcode}</b><br><small>${item.name}</small></div>
<button onclick="deleteItem(${actualIdx})" class="btn" style="color:var(--danger)"><i data-lucide="trash-2"></i></button>
</div>
               `;
           }).join('');
           lucide.createIcons();
       }
       function deleteItem(idx) {
           currentSession.items.splice(idx, 1);
           renderActiveSession();
       }
       function finishSession() {
           if (!currentSession.loc || currentSession.items.length === 0) {
               alert("Scan a location and at least one item first.");
               return;
           }
           const now = new Date();
           savedRecords.push({
               id: Date.now(),
               time: now.toLocaleString(),
               loc: currentSession.loc,
               items: [...currentSession.items]
           });
           localStorage.setItem('invFinalRecords', JSON.stringify(savedRecords));
           // Reset for next session
           currentSession = { loc: null, items: [] };
           document.getElementById('session-loc-display').innerText = "Wait Loc...";
           document.getElementById('active-session-list').innerHTML = "";
           document.getElementById('session-count-display').innerText = "Items: 0";
           updateSavedCount();
       }
       function updateSavedCount() {
           document.getElementById('saved-count').innerText = savedRecords.length;
       }
       // --- Export Modal Logic ---
       function openExportModal() {
           const list = document.getElementById('modal-record-list');
           if (savedRecords.length === 0) {
               list.innerHTML = "<p style='text-align:center; opacity:0.5;'>No saved records.</p>";
           } else {
               list.innerHTML = savedRecords.slice().reverse().map(r => `
<div class="scan-item" style="border-left-color:#cbd5e1">
<input type="checkbox" class="export-check" value="${r.id}" style="width:20px; height:20px;">
<div style="flex:1; margin-left:10px;">
<b>${r.loc}</b><br><small>${r.items.length} items - ${r.time}</small>
</div>
</div>
               `).join('');
           }
           document.getElementById('export-modal').style.display = 'flex';
           lucide.createIcons();
       }
       function closeExportModal() {
           document.getElementById('export-modal').style.display = 'none';
       }
       function selectAll(check) {
           document.querySelectorAll('.export-check').forEach(cb => cb.checked = check);
       }
       function processExport() {
           const selectedIds = Array.from(document.querySelectorAll('.export-check:checked')).map(cb => cb.value);
           if (selectedIds.length === 0) return alert("Select at least one record.");
           let csv = "Timestamp,Barcode,Item Name,Location\n";
           savedRecords.forEach(r => {
               if (selectedIds.includes(String(r.id))) {
                   r.items.forEach(i => {
                       csv += `"${r.time}","${i.barcode}","${i.name}","${r.loc}"\n`;
                   });
               }
           });
           const blob = new Blob([csv], { type: 'text/csv' });
           const a = document.createElement('a');
           a.href = URL.createObjectURL(blob);
           a.download = `Inventory_Export_${Date.now()}.csv`;
           a.click();
           closeExportModal();
       }
       // --- Database Logic ---
       function importExcel(e) {
           const reader = new FileReader();
           reader.onload = (ev) => {
               const workbook = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
               const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
               invDb = {};
               data.forEach(r => {
                   const barcode = String(Object.values(r)[0]).trim();
                   const name = String(Object.values(r)[1] || "Unknown");
                   invDb[barcode] = name;
               });
               localStorage.setItem('invDb', JSON.stringify(invDb));
               alert("Database Updated!");
           };
           reader.readAsArrayBuffer(e.target.files[0]);
       }
</script>
</body>
</html>
