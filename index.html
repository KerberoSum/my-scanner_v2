<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner Hub Pro - v5.0</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
       :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --dark: #0f172a; }
       * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
       body, html { margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); height: 100vh; width: 100vw; overflow: hidden; }
       .page { display: none; height: 100vh; width: 100vw; flex-direction: column; overflow: hidden; }
       .page.active { display: flex; }
       #page-home { justify-content: center; align-items: center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; text-align: center; }
       .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px; width: 100%; max-width: 400px; }
       .menu-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 25px 10px; cursor: pointer; transition: 0.2s; backdrop-filter: blur(10px); }
       .menu-card:active { transform: scale(0.95); }
       .menu-card i { margin-bottom: 10px; color: var(--primary); display: block; margin: 0 auto 10px auto; }
       .back-bar { background: white; padding: 12px 16px; display: flex; align-items: center; gap: 10px; font-weight: bold; border-bottom: 1px solid #e2e8f0; cursor: pointer; color: var(--dark); z-index: 100; }
       .scanner-container { position: relative; height: 35vh; width: 100%; background: #000; overflow: hidden; flex-shrink: 0; }
       #val-reader, #inv-reader { width: 100% !important; height: 100% !important; }
       #val-reader video, #inv-reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
       .viewfinder-box {
           position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
           width: 280px; height: 120px;
           border: 2px solid rgba(255,255,255,0.3); border-radius: 12px;
           z-index: 50; pointer-events: none;
       }
       .viewfinder-box::after {
           content: ''; position: absolute; inset: -2px;
           border: 4px solid var(--primary); border-radius: 12px;
           clip-path: polygon(0 0, 20% 0, 20% 10%, 80% 10%, 80% 0, 100% 0, 100% 30%, 90% 30%, 90% 70%, 100% 70%, 100% 100%, 80% 100%, 80% 90%, 20% 90%, 20% 100%, 0 100%, 0 70%, 10% 70%, 10% 30%, 0 30%);
       }
       .history-container { flex-grow: 1; background: var(--bg); border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 60; }
       /* Buttons */
       .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
       .btn { border: none; border-radius: 10px; padding: 10px 2px; font-size: 0.7rem; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
       .btn-primary { background: var(--primary); color: white; }
       .btn-success { background: #ecfdf5; color: var(--success); border: 1px solid #a7f3d0; }
       .btn-danger { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
       .btn-outline { background: white; border: 1px solid #e2e8f0; color: var(--dark); }
       .input-group { display: flex; gap: 8px; margin-bottom: 12px; background: white; padding: 8px; border-radius: 12px; flex-shrink: 0; }
       .input-group input { flex-grow: 1; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; outline: none; }
       .btn-submit { background: var(--dark); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; }
       .history-list { flex-grow: 1; overflow-y: auto; padding-bottom: 10px; }
       .scan-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: white; border-radius: 12px; margin-bottom: 8px; border-left: 6px solid #cbd5e1; gap: 10px; }
       /* Checkbox styling */
       .custom-checkbox { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary); }
       /* Sub-views for Inventory */
       .inv-sub-view { display: none; flex-direction: column; height: 100%; }
       .inv-sub-view.active { display: flex; }
       .flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 101; }
       .flash-active { animation: flash-anim 0.2s ease-out; }
       @keyframes flash-anim { 0% { opacity: 0.7; } 100% { opacity: 0; } }
</style>
</head>
<body>
<div id="page-home" class="page active">
<h1 style="margin-bottom:5px;">Scanner Hub Pro</h1>
<p style="opacity:0.7; margin-bottom:30px;">Professional Scanning Tools</p>
<div class="menu-grid">
<div class="menu-card" onclick="switchPage('page-validator')">
<i data-lucide="shield-check"></i><h3>Validator</h3>
</div>
<div class="menu-card" onclick="switchPage('page-inventory')">
<i data-lucide="package-search"></i><h3>Inventory</h3>
</div>
</div>
</div>
<div id="page-validator" class="page">
<div class="back-bar" onclick="stopAndHome('val')"><i data-lucide="chevron-left"></i> Validator Mode</div>
<div class="scanner-container">
<div id="val-reader"></div>
<div class="viewfinder-box"></div>
<div id="val-flash" class="flash-overlay"></div>
</div>
<div class="history-container">
<div class="action-grid">
<button id="val-toggle-btn" onclick="toggleScanner('val')" class="btn btn-primary"><i data-lucide="camera"></i><span id="val-btn-text">Start</span></button>
<button onclick="document.getElementById('val-file').click()" class="btn btn-success"><i data-lucide="file-up"></i>Import</button>
<button onclick="exportValCSV()" class="btn btn-outline"><i data-lucide="download"></i>Export</button>
<button onclick="clearValHistory()" class="btn btn-danger"><i data-lucide="trash-2"></i>Clear</button>
</div>
<input type="file" id="val-file" style="display:none" onchange="importExcel(event, 'val')">
<div class="input-group">
<input type="text" id="val-input" placeholder="Manual Input..." onkeypress="if(event.key==='Enter') handleManual('val')">
<button class="btn-submit" onclick="handleManual('val')">OK</button>
</div>
<div id="val-list" class="history-list"></div>
</div>
</div>
<div id="page-inventory" class="page">
<div class="back-bar" onclick="stopAndHome('inv')"><i data-lucide="chevron-left"></i> Inventory Mode</div>
<div class="scanner-container">
<div id="inv-reader"></div>
<div class="viewfinder-box"></div>
<div id="inv-flash" class="flash-overlay"></div>
</div>
<div class="history-container">
<div id="inv-view-dashboard" class="inv-sub-view active">
<div class="action-grid">
<button id="inv-toggle-btn" onclick="toggleScanner('inv')" class="btn btn-primary"><i data-lucide="camera"></i><span id="inv-btn-text">Start Cam</span></button>
<button onclick="startNewScanSession()" class="btn btn-success" style="background:var(--success); color:white; border:none;"><i data-lucide="plus-circle"></i>New Loc</button>
<button onclick="document.getElementById('inv-file').click()" class="btn btn-outline"><i data-lucide="database"></i>Import DB</button>
<button onclick="exportSelectedCSV()" class="btn btn-outline"><i data-lucide="download"></i>Export Sel.</button>
</div>
<input type="file" id="inv-file" style="display:none" onchange="importExcel(event, 'inv')">
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:0.85rem; font-weight:bold; color:var(--dark);">
<span>Saved Locations</span>
<a href="#" onclick="selectAll(true)" style="color:var(--primary); text-decoration:none;">Select All</a>
</div>
<div id="inv-dashboard-list" class="history-list"></div>
</div>
<div id="inv-view-scan" class="inv-sub-view">
<div id="inv-status" style="background:var(--dark); color:white; padding:12px; border-radius:12px; text-align:center; margin-bottom:12px; flex-shrink:0;">
<div id="inv-step" style="font-size:0.7rem; opacity:0.6; text-transform:uppercase;">Step 1</div>
<div id="inv-instr" style="font-weight:bold;">Scan Location Barcode</div>
<div id="inv-loc-info" style="display:none; color:var(--primary); margin-top:5px; font-weight:800; border-top:1px solid rgba(255,255,255,0.1); padding-top:5px;">TO: <span id="loc-display"></span></div>
</div>
<div class="action-grid">
<button onclick="cancelScanSession()" class="btn btn-danger"><i data-lucide="x-circle"></i>Cancel</button>
<button id="inv-finish-btn" onclick="finishLoc()" class="btn btn-primary" style="background:var(--success); display:none; grid-column: span 3;"><i data-lucide="check-circle"></i>Finish & Save</button>
</div>
<div class="input-group">
<input type="text" id="inv-input-scan" placeholder="Manual Type Barcode..." onkeypress="if(event.key==='Enter') handleManual('inv', 'scan')">
<button class="btn-submit" onclick="handleManual('inv', 'scan')">OK</button>
</div>
<div id="inv-scan-list" class="history-list"></div>
</div>
<div id="inv-view-detail" class="inv-sub-view">
<div style="background:#e2e8f0; padding:12px; border-radius:12px; margin-bottom:12px; flex-shrink:0;">
<div style="font-size:0.7rem; color:var(--dark); text-transform:uppercase; font-weight:bold;">Editing Location</div>
<div id="detail-loc-name" style="font-weight:900; font-size:1.1rem; color:var(--primary);"></div>
</div>
<div class="action-grid">
<button onclick="closeDetailView()" class="btn btn-outline" style="grid-column: span 2;"><i data-lucide="arrow-left"></i>Back</button>
<button onclick="deleteEntireRecord()" class="btn btn-danger" style="grid-column: span 2;"><i data-lucide="trash-2"></i>Delete Record</button>
</div>
<div class="input-group">
<input type="text" id="inv-input-detail" placeholder="Add Barcode to this Loc..." onkeypress="if(event.key==='Enter') handleManual('inv', 'detail')">
<button class="btn-submit" onclick="handleManual('inv', 'detail')">Add</button>
</div>
<div id="inv-detail-list" class="history-list"></div>
</div>
</div>
</div>
<script>
       let scanners = { val: null, inv: null };
       let valDb = {}, invDb = {};
       // Data Arrays
       let valHistory = [];
       let invFinalRecords = []; // Structure: { id: timestamp, t: string, to: string, items: [{barcode, name}] }
       // Session Variables
       let invSessionItems = [];
       let currentLoc = "";
       let isWaitLoc = true;
       // Navigation State
       let currentInvView = 'dashboard'; // 'dashboard', 'scan', 'detail'
       let activeRecordId = null;
       let lastScanTime = 0;
       // --- Audio Feedback ---
       function playBeep() {
           try {
               const ctx = new (window.AudioContext || window.webkitAudioContext)();
               const osc = ctx.createOscillator();
               const gain = ctx.createGain();
               osc.connect(gain); gain.connect(ctx.destination);
               osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
               gain.gain.setValueAtTime(0.1, ctx.currentTime);
               osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
               osc.stop(ctx.currentTime + 0.1);
           } catch (e) {}
       }
       // --- Init & Storage ---
       window.addEventListener('load', () => {
           lucide.createIcons();
           loadState();
       });
       function saveState() {
           localStorage.setItem('valDb', JSON.stringify(valDb));
           localStorage.setItem('invDb', JSON.stringify(invDb));
           localStorage.setItem('valHistory', JSON.stringify(valHistory));
           localStorage.setItem('invFinalRecords', JSON.stringify(invFinalRecords));
       }
       function loadState() {
           if(localStorage.getItem('valDb')) valDb = JSON.parse(localStorage.getItem('valDb'));
           if(localStorage.getItem('invDb')) invDb = JSON.parse(localStorage.getItem('invDb'));
           if(localStorage.getItem('valHistory')) {
               valHistory = JSON.parse(localStorage.getItem('valHistory'));
               renderVal();
           }
           if(localStorage.getItem('invFinalRecords')) {
               invFinalRecords = JSON.parse(localStorage.getItem('invFinalRecords'));
               // Compatibility check if older array structure exists without IDs
               invFinalRecords.forEach(r => { if(!r.id) r.id = Date.now() + Math.random(); });
           }
       }
       // --- Navigation ---
       function switchPage(id) {
           document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
           document.getElementById(id).classList.add('active');
           lucide.createIcons();
           if(id === 'page-inventory') {
               showInvSubView('dashboard');
           }
       }
       function showInvSubView(viewName) {
           currentInvView = viewName;
           document.querySelectorAll('.inv-sub-view').forEach(el => el.classList.remove('active'));
           document.getElementById(`inv-view-${viewName}`).classList.add('active');
           if(viewName === 'dashboard') renderDashboard();
       }
       async function stopAndHome(type) {
           await stopScanner(type);
           switchPage('page-home');
       }
       // --- Camera Logic ---
       async function stopScanner(type) {
           const btnText = document.getElementById(`${type}-btn-text`);
           if (scanners[type] && scanners[type].getState() === 2) {
               try {
                   await scanners[type].stop();
                   scanners[type].clear();
                   scanners[type] = null;
                   if(btnText) btnText.innerText = type === 'inv' ? "Start Cam" : "Start";
               } catch(e) {}
           }
       }
       async function toggleScanner(type) {
           const btnText = document.getElementById(`${type}-btn-text`);
           const readerId = `${type}-reader`;
           if (scanners[type] && scanners[type].getState() === 2) {
               await stopScanner(type);
           } else {
               if (!scanners[type]) scanners[type] = new Html5Qrcode(readerId);
               const config = { fps: 10, qrbox: { width: 280, height: 120 }, aspectRatio: 1.0 };
               try {
                   await scanners[type].start({ facingMode: "environment" }, config, (text) => onScanSuccess(type, text));
                   btnText.innerText = "Stop Cam";
               } catch (e) { alert("Camera error. Ensure HTTPS and permissions."); }
           }
       }
       function onScanSuccess(type, text) {
           if (Date.now() - lastScanTime < 1500) return; // Prevent duplicate reads
           lastScanTime = Date.now();
           playBeep();
           const flash = document.getElementById(`${type}-flash`);
           flash.classList.add('flash-active');
           setTimeout(() => flash.classList.remove('flash-active'), 200);
           if (navigator.vibrate) navigator.vibrate(50);
           if(type === 'val') processVal(text); else processInv(text);
       }
       function handleManual(type, context = null) {
           const inputId = type === 'val' ? 'val-input' : (context === 'scan' ? 'inv-input-scan' : 'inv-input-detail');
           const el = document.getElementById(inputId);
           if(!el.value) return;
           if(type === 'val') processVal(el.value); else processInv(el.value);
           el.value = ""; el.focus();
       }
       // --- Validator Logic ---
       function processVal(code) {
           code = code.trim();
           const res = valDb[code] || {s: 'Unknown'};
           valHistory.unshift({code, s: res.s, t: new Date().toLocaleTimeString()});
           saveState(); renderVal();
       }
       function renderVal() {
           document.getElementById('val-list').innerHTML = valHistory.map(i => `
<div class="scan-item" style="border-left-color:${i.s==='Approved'?'#10b981':'#ef4444'}">
<div><b>${i.code}</b><br><small>${i.s} | ${i.t}</small></div>
</div>`).join('');
       }
       function clearValHistory() {
           if(confirm("Clear validator history?")) { valHistory = []; saveState(); renderVal(); }
       }
       // --- Inventory Sub-View Routing & Logic ---
       function processInv(text) {
           text = text.trim();
           if (currentInvView === 'dashboard') {
               // If camera scans while on dashboard, auto-start a new session using it as Location
               startNewScanSession(text);
           }
           else if (currentInvView === 'scan') {
               if (isWaitLoc) {
                   // Manual setting of location
                   currentLoc = text; isWaitLoc = false;
                   document.getElementById('inv-step').innerText = "Step 2";
                   document.getElementById('inv-instr').innerText = "Scan Inventory Barcodes";
                   document.getElementById('loc-display').innerText = text;
                   document.getElementById('inv-loc-info').style.display = "block";
                   document.getElementById('inv-finish-btn').style.display = "inline-flex";
               } else {
                   // Scanning items into new session
                   const name = invDb[text] || "Unknown Item";
                   invSessionItems.push({barcode: text, name: name});
                   renderActiveScanList();
               }
           }
           else if (currentInvView === 'detail') {
               // Live adding item to an existing saved record
               const rec = invFinalRecords.find(r => r.id === activeRecordId);
               if(rec) {
                   const name = invDb[text] || "Unknown Item";
                   rec.items.push({barcode: text, name: name});
                   saveState();
                   renderDetailList(rec);
               }
           }
       }
       // --- View 1: Dashboard ---
       function renderDashboard() {
           const listEl = document.getElementById('inv-dashboard-list');
           if(invFinalRecords.length === 0) {
               listEl.innerHTML = `<div style="text-align:center; padding:20px; opacity:0.5;">No locations saved yet.</div>`;
               return;
           }
           listEl.innerHTML = invFinalRecords.slice().reverse().map(r => `
<div class="scan-item">
<input type="checkbox" class="export-check custom-checkbox" value="${r.id}">
<div onclick="openDetailView(${r.id})" style="flex-grow:1; margin-left:12px; cursor:pointer;">
<b style="color:var(--dark); font-size:1.1rem;">${r.to}</b><br>
<small style="color:var(--primary); font-weight:bold;">${r.items.length} Items</small> | <small>${r.t}</small>
</div>
<i data-lucide="chevron-right" style="color:#cbd5e1;" onclick="openDetailView(${r.id})"></i>
</div>
           `).join('');
           lucide.createIcons();
       }
       function selectAll(check) {
           document.querySelectorAll('.export-check').forEach(cb => cb.checked = check);
       }
       // --- View 2: Active Scan Session ---
       function startNewScanSession(autoLoc = null) {
           currentLoc = ""; invSessionItems = []; isWaitLoc = true;
           document.getElementById('inv-step').innerText = "Step 1";
           document.getElementById('inv-instr').innerText = "Scan Location Barcode";
           document.getElementById('inv-loc-info').style.display = "none";
           document.getElementById('inv-finish-btn').style.display = "none";
           document.getElementById('inv-scan-list').innerHTML = "";
           showInvSubView('scan');
           if(autoLoc) processInv(autoLoc); // Auto-apply location if passed
       }
       function renderActiveScanList() {
           document.getElementById('inv-scan-list').innerHTML = invSessionItems.slice().reverse().map(i => `
<div class="scan-item" style="border-left-color:var(--primary)">
<div><b>${i.barcode}</b><br><small>${i.name}</small></div>
</div>`).join('');
       }
       function cancelScanSession() {
           if(invSessionItems.length > 0 && !confirm("Discard current scan session?")) return;
           showInvSubView('dashboard');
       }
       function finishLoc() {
           if(invSessionItems.length === 0) return alert("No items scanned!");
           const d = new Date();
           const ts = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${d.getHours()}:${d.getMinutes()}:${d.getSeconds()}`;
           invFinalRecords.push({
               id: Date.now(), // Unique ID for drill-down editing
               t: ts,
               to: currentLoc,
               items: [...invSessionItems]
           });
           saveState();
           showInvSubView('dashboard');
       }
       // --- View 3: Detail / Edit View ---
       function openDetailView(id) {
           activeRecordId = id;
           const rec = invFinalRecords.find(r => r.id === id);
           if(!rec) return;
           document.getElementById('detail-loc-name').innerText = rec.to;
           renderDetailList(rec);
           showInvSubView('detail');
       }
       function renderDetailList(rec) {
           const listEl = document.getElementById('inv-detail-list');
           if(rec.items.length === 0) {
               listEl.innerHTML = `<div style="text-align:center; opacity:0.5; padding:10px;">Location is empty. Scan to add.</div>`;
               return;
           }
           // Render items with a delete button for each
           listEl.innerHTML = rec.items.slice().reverse().map((item, reverseIndex) => {
               const actualIndex = rec.items.length - 1 - reverseIndex;
               return `
<div class="scan-item" style="border-left-color:var(--warning)">
<div style="flex-grow:1;"><b>${item.barcode}</b><br><small>${item.name}</small></div>
<button onclick="deleteItemFromRecord(${actualIndex})" class="btn btn-danger" style="padding:6px; border-radius:6px;"><i data-lucide="x"></i></button>
</div>`;
           }).join('');
           lucide.createIcons();
       }
       function deleteItemFromRecord(index) {
           const rec = invFinalRecords.find(r => r.id === activeRecordId);
           if(rec) {
               rec.items.splice(index, 1);
               saveState();
               renderDetailList(rec);
           }
       }
       function deleteEntireRecord() {
           if(!confirm("Are you sure you want to delete this entire location and all its items?")) return;
           invFinalRecords = invFinalRecords.filter(r => r.id !== activeRecordId);
           saveState();
           showInvSubView('dashboard');
       }
       function closeDetailView() {
           activeRecordId = null;
           showInvSubView('dashboard');
       }
       // --- Export Logic ---
       function exportSelectedCSV() {
           const checked = document.querySelectorAll('.export-check:checked');
           if(checked.length === 0) return alert("Please select at least one record to export using the checkboxes.");
           // Note: Removed quotes (") to prevent systems from importing literal quotes.
           let csv = "Date Time,Barcode,To\n";
           checked.forEach(cb => {
               const rec = invFinalRecords.find(r => r.id == cb.value);
               if(rec) {
                   const barcodesJoined = rec.items.map(i => i.barcode).join('; ');
                   csv += `${rec.t},${barcodesJoined},${rec.to}\n`;
               }
           });
           downloadCSV(csv, "Inventory_Selected_Report.csv");
       }
       // --- Database Import ---
       function importExcel(e, type) {
           const reader = new FileReader();
           reader.onload = (event) => {
               try {
                   const workbook = XLSX.read(new Uint8Array(event.target.result), {type:'array'});
                   const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                   if(type === 'val') {
                       valDb = {};
                       data.forEach(r => { const vals = Object.values(r); valDb[String(vals[0]).trim()] = {s: vals[1] || 'Unknown'}; });
                   } else {
                       invDb = {};
                       data.forEach(r => {
                           const barcode = String(r.Barcode || r.O || Object.values(r)[0] || '').trim();
                           const name = String(r.Name || r.B || Object.values(r)[1] || 'Unknown');
                           if(barcode) invDb[barcode] = name;
                       });
                   }
                   saveState();
                   alert("Database Imported Successfully!");
               } catch(err) { alert("Error reading file."); }
           };
           if(e.target.files.length > 0) reader.readAsArrayBuffer(e.target.files[0]);
           e.target.value = '';
       }
       function downloadCSV(csv, name) {
           const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
           const a = document.createElement("a");
           a.href = URL.createObjectURL(blob);
           a.download = name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
       }
</script>
</body>
</html>
