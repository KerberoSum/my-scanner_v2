<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Hub Pro</title>
    <!-- Libraries -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --bg: #f1f5f9; --dark: #0f172a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* --- 框架切換 --- */
        .page { display: none; height: 100vh; width: 100vw; flex-direction: column; overflow: hidden; }
        .page.active { display: flex; }

        /* --- 主選單 --- */
        #page-home {
            justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; text-align: center;
        }
        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
            padding: 20px; width: 100%; max-width: 400px;
        }
        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 25px 10px;
            cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px);
        }
        .menu-card:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.2); }
        .menu-card i { margin-bottom: 10px; color: var(--primary); display: block; margin-left: auto; margin-right: auto; }
        .menu-card h3 { margin: 0; font-size: 0.9rem; }

        /* --- 共用掃描區與 UI --- */
        .back-bar {
            background: white; padding: 12px 16px; display: flex; align-items: center;
            gap: 10px; font-weight: bold; border-bottom: 1px solid #e2e8f0; color: var(--dark); cursor: pointer;
        }
        .scanner-container { position: relative; height: 30vh; width: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .reader-div { width: 100% !important; height: 100% !important; border: none !important; }
        .viewfinder-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 240px; height: 60px; border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; z-index: 20; pointer-events: none; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); }
        .viewfinder-box::after { content: ''; position: absolute; inset: -2px; border: 3px solid var(--primary); border-radius: 12px; clip-path: polygon(0 0, 20% 0, 20% 10%, 80% 10%, 80% 0, 100% 0, 100% 30%, 90% 30%, 90% 70%, 100% 70%, 100% 100%, 80% 100%, 80% 90%, 20% 90%, 20% 100%, 0 100%, 0 70%, 10% 70%, 10% 30%, 0 30%); }
        .scan-line { position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; background: rgba(37, 99, 235, 0.5); box-shadow: 0 0 8px var(--primary); z-index: 21; transform: translateY(-50%); }
        
        .history-container { flex-grow: 1; background: var(--bg); border-top-left-radius: 24px; border-top-right-radius: 24px; z-index: 30; padding: 16px; display: flex; flex-direction: column; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .stats-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 14px; border-radius: 12px; margin-bottom: 12px; font-size: 0.8rem; font-weight: 600; color: #64748b; }
        .stat-highlight { color: var(--primary); font-weight: 800; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
        .btn { border: none; border-radius: 10px; padding: 10px 4px; font-size: 0.7rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 1px solid #e2e8f0; color: var(--dark); }
        .btn-success-outline { background: #ecfdf5; border: 1px solid #a7f3d0; color: var(--success); }
        .btn-danger-outline { background: #fff1f2; border: 1px solid #fecaca; color: var(--danger); }
        .btn-finish { background: var(--success); color: white; display: none; }
        
        .history-list { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }
        .scan-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border-radius: 12px; margin-bottom: 8px; border-left: 6px solid #cbd5e1; }
        .flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 100; }
        .flash-active { animation: flash-anim 0.15s ease-out; }
        @keyframes flash-anim { 0% { opacity: 0.6; } 100% { opacity: 0; } }

        /* 盤點專用狀態列 */
        .inv-header { background: var(--dark); color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; text-align: center; }
        .loc-badge { background: #e0f2fe; color: #0369a1; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; margin-top: 5px; display: none; border: 1px solid #bae6fd; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 頁面 1: 首頁 -->
    <div id="page-home" class="page active">
        <div style="margin-bottom: 30px;">
            <h1 style="margin: 0;">Scanner Hub Pro</h1>
            <p style="opacity: 0.7;">請選擇作業模式</p>
        </div>
        <div class="menu-grid">
            <div class="menu-card" onclick="switchPage('page-validator')">
                <i data-lucide="shield-check" style="width:32px;"></i>
                <h3>資料比對驗證</h3>
            </div>
            <div class="menu-card" onclick="switchPage('page-inventory')">
                <i data-lucide="package-search" style="width:32px;"></i>
                <h3>庫存盤點模式</h3>
            </div>
            <div class="menu-card" style="opacity:0.5">
                <i data-lucide="history" style="width:32px;"></i>
                <h3>歷史紀錄 (待續)</h3>
            </div>
            <div class="menu-card" onclick="alert('設定頁面開發中')">
                <i data-lucide="settings" style="width:32px;"></i>
                <h3>系統設定</h3>
            </div>
        </div>
    </div>

    <!-- 頁面 2: 功能一 - 資料驗證 -->
    <div id="page-validator" class="page">
        <div class="back-bar" onclick="stopScannerAndHome('val')">
            <i data-lucide="chevron-left"></i> 返回主選單
        </div>
        <div class="scanner-container">
            <div id="val-reader" class="reader-div"></div>
            <div class="viewfinder-box"><div class="scan-line"></div></div>
            <div id="val-flash" class="flash-overlay"></div>
        </div>
        <div class="history-container">
            <div class="stats-bar">
                <span>DB: <span id="val-db-count" class="stat-highlight">0</span></span>
                <span>Total: <span id="val-total-count" class="stat-highlight">0</span></span>
            </div>
            <div class="action-grid">
                <button id="val-toggle-btn" onclick="toggleScanner('val')" class="btn btn-primary">
                    <i data-lucide="camera"></i> <span id="val-toggle-text">Start</span>
                </button>
                <button onclick="document.getElementById('val-excel-input').click()" class="btn btn-success-outline">
                    <i data-lucide="file-up"></i> Import
                </button>
                <input type="file" id="val-excel-input" accept=".xlsx, .xls" style="display:none" onchange="handleValImport(event)">
                <button onclick="exportValCSV()" class="btn btn-outline">
                    <i data-lucide="download"></i> Export
                </button>
                <button onclick="handleValClear()" class="btn btn-danger-outline">
                    <i data-lucide="trash-2"></i> Clear
                </button>
            </div>
            <div id="val-scans-list" class="history-list"></div>
        </div>
    </div>

    <!-- 頁面 3: 功能二 - 庫存盤點 -->
    <div id="page-inventory" class="page">
        <div class="back-bar" onclick="stopScannerAndHome('inv')">
            <i data-lucide="chevron-left"></i> 返回主選單
        </div>
        <div class="scanner-container">
            <div id="inv-reader" class="reader-div"></div>
            <div class="viewfinder-box"><div class="scan-line"></div></div>
            <div id="inv-flash" class="flash-overlay"></div>
        </div>
        <div class="history-container">
            <div class="inv-header">
                <div id="inv-step">STEP 1</div>
                <div id="inv-instruction" style="font-weight:bold">請掃描儲位 (Location)</div>
                <div id="loc-badge" class="loc-badge">To: <span id="current-loc-text"></span></div>
            </div>
            <div class="action-grid">
                <button id="inv-toggle-btn" onclick="toggleScanner('inv')" class="btn btn-primary">
                    <i data-lucide="camera"></i> <span id="inv-toggle-text">Start</span>
                </button>
                <button onclick="document.getElementById('inv-excel-input').click()" class="btn btn-success-outline">
                    <i data-lucide="file-up"></i> Import DB
                </button>
                <input type="file" id="inv-excel-input" accept=".xlsx, .xls" style="display:none" onchange="handleInvImport(event)">
                <button id="btn-inv-finish" onclick="finishInventoryPractice()" class="btn btn-finish">
                    <i data-lucide="check-circle"></i> 完成儲位
                </button>
                <button onclick="exportInvCSV()" class="btn btn-outline">
                    <i data-lucide="download"></i> Export CSV
                </button>
            </div>
            <div id="inv-scans-list" class="history-list"></div>
        </div>
    </div>

    <script>
        // --- 通用全域變數 ---
        let lastScanTime = 0;
        let scanners = { val: null, inv: null };
        let scanningState = { val: false, inv: false };

        // --- 功能一變數 ---
        let valDb = new Map();
        let valHistory = [];

        // --- 功能二變數 ---
        let invDb = new Map(); // Key: O欄(Barcode), Value: B欄(Name)
        let invPracticeHistory = []; // 最終 CSV 紀錄
        let currentLoc = ""; // 當前儲位
        let currentLocItems = []; // 當前儲位掃到的貨品
        let isWaitingForLocation = true;

        // --- 框架邏輯 ---
        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            lucide.createIcons();
            if(id === 'page-inventory') resetInventoryFlow();
        }

        async function stopScannerAndHome(type) {
            if (scanningState[type]) await toggleScanner(type);
            switchPage('page-home');
        }

        // --- 掃描核心切換 ---
        async function toggleScanner(type) {
            const btnText = document.getElementById(`${type}-toggle-text`);
            const btn = document.getElementById(`${type}-toggle-btn`);
            
            if (!scanningState[type]) {
                if (!scanners[type]) scanners[type] = new Html5Qrcode(`${type}-reader`);
                try {
                    await scanners[type].start(
                        { facingMode: "environment" },
                        { fps: 20, qrbox: { width: 240, height: 60 }, aspectRatio: 1.0 },
                        (text) => onScanSuccess(type, text)
                    );
                    scanningState[type] = true;
                    btnText.innerText = "Stop";
                    btn.classList.replace('btn-primary', 'btn-stop');
                    btn.style.background = "#0f172a";
                } catch (err) { alert("相機啟動失敗"); }
            } else {
                await scanners[type].stop();
                scanningState[type] = false;
                btnText.innerText = "Start";
                btn.classList.replace('btn-stop', 'btn-primary');
                btn.style.background = "#2563eb";
            }
        }

        function onScanSuccess(type, text) {
            const now = Date.now();
            if (now - lastScanTime < 1200) return;
            lastScanTime = now;

            // 回饋
            const flash = document.getElementById(`${type}-flash`);
            flash.classList.remove('flash-active'); void flash.offsetWidth; flash.classList.add('flash-active');
            if (navigator.vibrate) navigator.vibrate(50);

            if (type === 'val') processValScan(text);
            else processInvScan(text);
        }

        // --- 功能一邏輯：驗證 ---
        function handleValImport(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                valDb.clear();
                rows.forEach(r => { if(r[0]) valDb.set(String(r[0]).trim(), {status: r[1]||'Unknown', i1: r[2]||'', i2: r[3]||''}); });
                document.getElementById('val-db-count').innerText = valDb.size;
                alert(`匯入 ${valDb.size} 筆`);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        function processValScan(code) {
            const data = valDb.get(code) || {status: 'Unknown', i1: 'Not in DB', i2: ''};
            valHistory.unshift({code, ...data, time: new Date().toLocaleTimeString()});
            renderValList();
        }

        function renderValList() {
            const list = document.getElementById('val-scans-list');
            document.getElementById('val-total-count').innerText = valHistory.length;
            list.innerHTML = valHistory.map(item => `
                <div class="scan-item" style="border-left-color: ${getStatusColor(item.status)}">
                    <div>
                        <div style="font-family:monospace; font-weight:800;">${item.code}</div>
                        <div style="font-size:0.75rem; color:#64748b;">${item.status} | ${item.time}</div>
                    </div>
                </div>`).join('');
        }

        function getStatusColor(s) {
            return s === 'Approved' ? '#10b981' : (s === 'Not Approved' ? '#ef4444' : '#64748b');
        }

        // --- 功能二邏輯：庫存盤點 ---
        function handleInvImport(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const data = XLSX.utils.sheet_to_json(sheet);
                invDb.clear();
                // 根據要求：Column O 是 Barcode, Column B 是 Name
                data.forEach(row => {
                    const keys = Object.keys(row);
                    const barcode = row[keys[14]]; // O 欄
                    const name = row[keys[1]];    // B 欄
                    if(barcode) invDb.set(String(barcode).trim(), String(name || 'Unknown'));
                });
                alert("資料庫(O/B欄)匯入成功");
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        function resetInventoryFlow() {
            currentLoc = ""; currentLocItems = []; isWaitingForLocation = true;
            document.getElementById('inv-step').innerText = "STEP 1";
            document.getElementById('inv-instruction').innerText = "請掃描儲位 (Location)";
            document.getElementById('loc-badge').style.display = "none";
            document.getElementById('btn-inv-finish').style.display = "none";
            document.getElementById('inv-scans-list').innerHTML = "";
        }

        function processInvScan(text) {
            if (isWaitingForLocation) {
                currentLoc = text;
                isWaitingForLocation = false;
                document.getElementById('inv-step').innerText = "STEP 2";
                document.getElementById('inv-instruction').innerText = "請掃描貨品條碼";
                document.getElementById('current-loc-text').innerText = text;
                document.getElementById('loc-badge').style.display = "inline-block";
                document.getElementById('btn-inv-finish').style.display = "flex";
            } else {
                const itemName = invDb.get(text.trim()) || "⚠ 不在清單中";
                currentLocItems.push({barcode: text, name: itemName});
                renderInvList();
            }
        }

        function renderInvList() {
            const list = document.getElementById('inv-scans-list');
            list.innerHTML = currentLocItems.slice().reverse().map(item => `
                <div class="scan-item" style="border-left-color: var(--primary)">
                    <div><div style="font-weight:bold">${item.barcode}</div><div style="font-size:0.75rem; color:var(--primary)">${item.name}</div></div>
                </div>`).join('');
        }

        function finishInventoryPractice() {
            if (currentLocItems.length === 0) return alert("尚未掃描貨品");
            
            const now = new Date();
            // 格式: d/m/yyyy h:m:s
            const timeStr = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
            const barcodeStr = currentLocItems.map(i => i.barcode).join('; ');

            invPracticeHistory.push({ dateTime: timeStr, barcode: barcodeStr, to: currentLoc });
            alert(`儲位 ${currentLoc} 盤點紀錄成功！`);
            resetInventoryFlow();
        }

        function exportInvCSV() {
            if (invPracticeHistory.length === 0) return alert("無紀錄可導出");
            let csv = "Date Time,Barcode,To\n";
            invPracticeHistory.forEach(r => {
                csv += `"${r.dateTime}","${r.barcode}","${r.to}"\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `Inventory_Practice_${new Date().getTime()}.csv`;
            a.click();
        }

        // 初始化圖示
        lucide.createIcons();
    </script>
</body>
</html>
