<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Hub Pro</title>
    <!-- 引入原有的 Libraries -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --dark: #0f172a;
            --card: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* --- 導覽切換邏輯 --- */
        .page {
            display: none; /* 預設隱藏所有頁面 */
            height: 100vh;
            width: 100vw;
            flex-direction: column;
        }

        .page.active {
            display: flex; /* 只顯示 active 頁面 */
        }

        /* --- 首頁選單樣式 --- */
        #main-menu {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .menu-card:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.2); }
        
        .menu-card i { margin-bottom: 12px; color: var(--primary); }
        .menu-card h3 { margin: 0; font-size: 0.9rem; }

        /* --- 返回按鈕 --- */
        .back-bar {
            background: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            border-bottom: 1px solid #e2e8f0;
        }

        /* 這裡放你原本的 CSS 樣式 (省略部分重複內容以保持簡潔) */
        /* ... 保留原本的 #scanner-container, #history-container, .btn 等樣式 ... */
    </style>
</head>
<body>

    <!-- 1. 主選單頁面 -->
    <div id="page-home" class="page active">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="margin: 0;">Scanner Hub</h1>
            <p style="opacity: 0.6;">請選擇工作模式</p>
        </div>
        
        <div class="menu-grid">
            <!-- 功能 1: 妳原本的驗證功能 -->
            <div class="menu-card" onclick="switchPage('page-validator')">
                <i data-lucide="shield-check" style="width:40px; height:40px;"></i>
                <h3>資料驗證模式</h3>
            </div>

            <!-- 功能 2: 預留給未來的功能 (例如：純庫存盤點) -->
            <div class="menu-card" style="opacity: 0.5;">
                <i data-lucide="package" style="width:40px; height:40px;"></i>
                <h3>庫存盤點 (待加入)</h3>
            </div>

            <!-- 功能 3: 預留 -->
            <div class="menu-card" style="opacity: 0.5;">
                <i data-lucide="list-plus" style="width:40px; height:40px;"></i>
                <h3>快速入庫 (待加入)</h3>
            </div>

            <!-- 設定按鈕 -->
            <div class="menu-card" onclick="alert('設定頁面開發中')">
                <i data-lucide="settings" style="width:40px; height:40px;"></i>
                <h3>系統設定</h3>
            </div>
        </div>
    </div>

    <!-- 2. 原本的條碼驗證頁面 -->
    <div id="page-validator" class="page">
        <div class="back-bar" onclick="stopEverythingAndGoHome()">
            <i data-lucide="chevron-left"></i> 返回主選單
        </div>
        
        <!-- 這裡放入你原本 PDF 中的 HTML 結構 (如 #scanner-container, #history-container) -->
        <div id="scanner-container">
            <div id="reader"></div>
            <div class="viewfinder-box"><div class="scan-line"></div></div>
            <div id="flash"></div>
        </div>

        <div id="history-container" style="flex:1; overflow-y:auto;">
            <!-- 原本的 stats-bar, action-grid, manual-input-group, scans-list 等 -->
            <div class="stats-bar">
                <span>DB: <span id="db-count" class="stat-highlight">0</span></span>
                <span>Total: <span id="total-count" class="stat-highlight">0</span></span>
            </div>
            <!-- ... 原本的其他按鈕與清單 ... -->
        </div>
    </div>

    <script>
        // --- 導覽邏輯 ---
        function switchPage(pageId) {
            // 隱藏所有頁面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 顯示目標頁面
            document.getElementById(pageId).classList.add('active');
            
            // 如果進入的是驗證頁面，初始化圖示
            lucide.createIcons();
        }

        async function stopEverythingAndGoHome() {
            // 如果相機正在執行，先停止它
            if (typeof isScanning !== 'undefined' && isScanning) {
                await toggleCamera(); // 調用你原本的停止相機函式
            }
            switchPage('page-home');
        }

        // --- 這裡放入你原本 PDF 中的所有 JavaScript 邏輯 ---
        // (handleImport, processBarcode, renderList, toggleCamera 等)
        
        // 初始化首頁圖示
        lucide.createIcons();
    </script>
</body>
</html>
